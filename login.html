<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 背景网格 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* 光晕 */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .glow-1 {
    width: 400px; height: 400px;
    background: rgba(124,109,250,0.12);
    top: -100px; left: -100px;
  }
  .glow-2 {
    width: 300px; height: 300px;
    background: rgba(250,109,143,0.08);
    bottom: -80px; right: -80px;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 400px;
    animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
    margin-bottom: 36px;
    letter-spacing: 0.3px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  input[type="password"]:focus {
    border-color: var(--accent);
    background: rgba(124,109,250,0.06);
  }

  input[type="password"]::placeholder { letter-spacing: 0; color: var(--muted); }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #9b8ef7);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  button:hover  { opacity: 0.9; }
  button:active { transform: scale(0.98); }

  button.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    animation: shimmer 1s infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .error {
    margin-top: 14px;
    font-size: 13px;
    color: var(--accent2);
    text-align: center;
    height: 18px;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">PROXY</div>
  <p class="subtitle">输入访问密码以继续</p>

  <label for="pwd">密码</label>
  <input type="password" id="pwd" placeholder="••••••••" autofocus />

  <button id="btn" onclick="login()">进入</button>
  <div class="error" id="err"></div>
</div>

<script>
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pwd = document.getElementById('pwd').value;
    if (!pwd) return;

    btn.textContent = '验证中…';
    btn.classList.add('loading');
    btn.disabled = true;
    err.textContent = '';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        err.textContent = '密码错误，请重试';
        btn.textContent = '进入';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    } catch {
      err.textContent = '网络异常，请稍后再试';
      btn.textContent = '进入';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
