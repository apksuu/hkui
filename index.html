<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROXY — 加速访问</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.13);
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --muted2: #44445a;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* 背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { width: 500px; height: 500px; background: rgba(124,109,250,0.1);  top: -150px; left: -150px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(250,109,143,0.07); bottom: -100px; right: -100px; }

  /* 顶栏 */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }

  .logout-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--border-hover); }

  /* 主体 */
  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
    margin-bottom: 20px;
    opacity: 0;
    animation: fade-up 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    letter-spacing: -1.5px;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 16px;
    opacity: 0;
    animation: fade-up 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
    margin-bottom: 48px;
    opacity: 0;
    animation: fade-up 0.5s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  /* 输入区 */
  .input-wrap {
    width: 100%;
    max-width: 560px;
    opacity: 0;
    animation: fade-up 0.5s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(124,109,250,0.4);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.08);
  }

  input[type="url"], input[type="text"] {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }

  input::placeholder { color: var(--muted2); }

  .go-btn {
    background: linear-gradient(135deg, var(--accent), #9b8ef7);
    border: none;
    border-radius: 9px;
    padding: 10px 22px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .go-btn:hover  { opacity: 0.88; }
  .go-btn:active { transform: scale(0.97); }

  .hint { font-size: 12px; color: var(--muted2); margin-top: 10px; padding-left: 4px; }

  /* 历史记录 */
  .history-section {
    width: 100%;
    max-width: 560px;
    margin-top: 48px;
    opacity: 0;
    animation: fade-up 0.5s 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .history-item:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.03); }

  .history-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: rgba(124,109,250,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .history-url {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-del {
    font-size: 16px;
    color: var(--muted2);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .history-del:hover { color: var(--accent2); }

  .empty-history {
    text-align: center;
    color: var(--muted2);
    font-size: 13px;
    padding: 20px 0;
    font-style: italic;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    header { padding: 16px 20px; }
    main { padding: 60px 16px 48px; }
    .go-btn { padding: 10px 16px; }
  }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
  <div class="logo">PROXY</div>
  <button class="logout-btn" onclick="logout()">退出登录</button>
</header>

<main>
  <p class="hero-label">Cloudflare 加速</p>
  <h1>访问任意<span>网站</span></h1>
  <p class="desc">输入目标网址，通过 Cloudflare 边缘节点加速访问，支持 HTTP / HTTPS。</p>

  <div class="input-wrap">
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://example.com" />
      <button class="go-btn" onclick="go()">访问 →</button>
    </div>
    <p class="hint">按 Enter 或点击按钮，新标签页打开</p>
  </div>

  <div class="history-section">
    <p class="section-title">最近访问</p>
    <div class="history-list" id="history-list"></div>
  </div>
</main>

<script>
  const HISTORY_KEY = 'proxy_history';
  const MAX_HISTORY = 8;

  // 读取历史
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(url) {
    let list = getHistory().filter(u => u !== url);
    list.unshift(url);
    if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    renderHistory();
  }

  function deleteHistory(url) {
    const list = getHistory().filter(u => u !== url);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    renderHistory();
  }

  function renderHistory() {
    const list = getHistory();
    const el = document.getElementById('history-list');
    if (list.length === 0) {
      el.innerHTML = '<p class="empty-history">暂无记录</p>';
      return;
    }
    el.innerHTML = list.map(url => {
      const host = (() => { try { return new URL(url).hostname; } catch { return url; } })();
      return `
        <div class="history-item" onclick="openProxy('${encodeURIComponent(url)}')">
          <div class="history-icon">🌐</div>
          <span class="history-url">${host}</span>
          <button class="history-del" onclick="event.stopPropagation(); deleteHistory('${url.replace(/'/g,"\\'")}')">×</button>
        </div>`;
    }).join('');
  }

  function go() {
    let val = document.getElementById('url-input').value.trim();
    if (!val) return;
    if (!/^https?:\/\//i.test(val)) val = 'https://' + val;
    try { new URL(val); } catch { alert('请输入有效的网址'); return; }
    saveHistory(val);
    window.open(`/proxy/?target=${encodeURIComponent(val)}`, '_blank');
    document.getElementById('url-input').value = '';
  }

  function openProxy(encodedUrl) {
    window.open(`/proxy/?target=${encodedUrl}`, '_blank');
  }

  async function logout() {
    // 清除 Cookie（服务端设置了 HttpOnly，需请求注销接口）
    await fetch('/api/logout', { method: 'POST' }).catch(() => {});
    window.location.href = '/login.html';
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') go();
  });

  // 初始化
  renderHistory();
</script>
</body>
</html>
