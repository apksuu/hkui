<input id="domain" placeholder="https://example.com" />
<button onclick="go()">加速访问</button>

<script>
function go() {
  const target = document.getElementById("domain").value.trim();
  if (!target.startsWith("http")) {
    alert("请输入完整 URL，包含 https://");
    return;
  }
  // 在 iframe 或新标签中打开代理链接
  window.open(`/proxy/?target=${encodeURIComponent(target)}`, "_blank");
}
</script>
